[project]
name = 'On-chain-Petition-Signing'
description = 'A decentralized petition signing system with built-in analytics'
authors = ['handellupez']
telemetry = true
cache_dir = '.\.cache'
requirements = []

[contracts.On-chain-Petition-Signing]
path = 'contracts/On-chain-Petition-Signing.clar'
clarity_version = 3
epoch = 3.1

[repl.analysis]
passes = ['check_checker']

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false

[repl.remote_data]
enabled = false
api_url = 'https://api.hiro.so'
